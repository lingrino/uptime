on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
      - name: build
        run: npm run build
      - name: run tests
        run: npm test
