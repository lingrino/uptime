<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Strict-Transport-Security"
      content="max-age=63072000; includeSubDomains; preload;"
    />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="no-referrer" />
    <link rel="manifest" href="/site/site.webmanifest" />
    <title>Uptime Calculator</title>
    <meta name="description" content="Uptime Calculator" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/icons/favicon-192x192.png"
    />
    <link
      rel="apple-touch-startup-image"
      href="/icons/favicon-192x192.png"
    />
    <meta name="theme-color" content="#064E3B" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <noscript>
      <div id="nojs">
        <h1>Uptime Calculator</h1>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th><b>Availability</b></th>
                <th><b>Daily</b></th>
                <th><b>Weekly</b></th>
                <th><b>Monthly</b></th>
                <th><b>Quarterly</b></th>
                <th><b>Yearly</b></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><b>99.999%</b></td>
                <td>1s</td>
                <td>6s</td>
                <td>26s</td>
                <td>1m&nbsp;19s</td>
                <td>5m&nbsp;16s</td>
              </tr>
              <tr>
                <td><b>99.99%</b></td>
                <td>9s</td>
                <td>1m&nbsp;0s</td>
                <td>4m&nbsp;23s</td>
                <td>13m&nbsp;9s</td>
                <td>52m&nbsp;36s</td>
              </tr>
              <tr>
                <td><b>99.95%</b></td>
                <td>43s</td>
                <td>5m&nbsp;2s</td>
                <td>21m&nbsp;55s</td>
                <td>1h&nbsp;5m&nbsp;45s</td>
                <td>4h&nbsp;22m&nbsp;59s</td>
              </tr>
              <tr>
                <td><b>99.9%</b></td>
                <td>1m&nbsp;26s</td>
                <td>10m&nbsp;5s</td>
                <td>43m&nbsp;50s</td>
                <td>2h&nbsp;11m&nbsp;29s</td>
                <td>8h&nbsp;45m&nbsp;58s</td>
              </tr>
              <tr>
                <td><b>99.5%</b></td>
                <td>7m&nbsp;12s</td>
                <td>50m&nbsp;24s</td>
                <td>3h&nbsp;39m&nbsp;9s</td>
                <td>10h&nbsp;57m&nbsp;27s</td>
                <td>1d&nbsp;19h&nbsp;49m&nbsp;48s</td>
              </tr>
              <tr>
                <td><b>99%</b></td>
                <td>14m&nbsp;24s</td>
                <td>1h&nbsp;40m&nbsp;48s</td>
                <td>7h&nbsp;18m&nbsp;18s</td>
                <td>21h&nbsp;54m&nbsp;54s</td>
                <td>3d&nbsp;15h&nbsp;39m&nbsp;36s</td>
              </tr>
              <tr>
                <td><b>95%</b></td>
                <td>1h&nbsp;12m&nbsp;0s</td>
                <td>8h&nbsp;24m&nbsp;0s</td>
                <td>1d&nbsp;12h&nbsp;31m&nbsp;30s</td>
                <td>4d&nbsp;13h&nbsp;34m&nbsp;30s</td>
                <td>18d&nbsp;6h&nbsp;18m&nbsp;0s</td>
              </tr>
              <tr>
                <td><b>90%</b></td>
                <td>2h&nbsp;24m&nbsp;0s</td>
                <td>16h&nbsp;48m&nbsp;0s</td>
                <td>3d&nbsp;1h&nbsp;3m&nbsp;0s</td>
                <td>9d&nbsp;3h&nbsp;9m&nbsp;0s</td>
                <td>36d&nbsp;12h&nbsp;36m&nbsp;0s</td>
              </tr>
            </tbody>
          </table>
        </div>
        <h3>
          I hope this uptime table is useful! This site has no tracking but
          needs JavaScript to work as intended.
        </h3>
      </div>
    </noscript>

    <div class="js-enabled">
      <div class="layout">
        <div class="layout-main">
          <header class="header">
            <h1>Uptime Calculator</h1>
          </header>
          <main class="main">
            <div class="calculator">
              <div class="input-section">
                <div class="input-wrap">
                  <input
                    type="text"
                    id="uptime-input"
                    class="input-valid"
                    placeholder="99.9"
                    aria-label="uptime percentage"
                  />
                  <div class="input-suffix">%</div>
                </div>
              </div>
              <div class="downtime-card">
                <div id="downtime-list"></div>
              </div>
            </div>
          </main>
        </div>
        <footer class="footer">
          Made by
          <a href="https://lingrino.com" target="_blank" rel="noopener"
            >Sean Lingren</a
          >
          &nbsp;•&nbsp;
          <a
            href="https://github.com/lingrino/uptime"
            target="_blank"
            rel="noopener"
            >Source Code</a
          >
        </footer>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
